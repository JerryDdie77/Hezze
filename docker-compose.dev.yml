services:
  postgres:
    image: postgres:15-alpine
    container_name: hezze_postgres_dev
    env_file:
      - ./Server/.env
    environment:
      POSTGRES_USER: Backend
      POSTGRES_PASSWORD: SuperStrongBackendPassword
      POSTGRES_DB: hezze_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - hezze_app_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Backend -d hezze_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: hezze_backend_dev
    env_file:
      - ./Server/.env
    ports:
      - "8000:8000"
    networks:
      - hezze_app_dev
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./Front
      dockerfile: Dockerfile
    container_name: hezze_frontend_dev
    ports:
      - "3000:3000"
    networks:
      - hezze_app_dev
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./Front:/app          
      - /app/node_modules     
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true     
    stdin_open: true
    tty: true
    restart: unless-stopped

networks:
  hezze_app_dev:
    driver: bridge

volumes:
  postgres_data_dev: